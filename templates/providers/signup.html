{% extends 'base.html' %}

{% block title %}Provider Signup - CareConnect{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="text-center mb-2">Create Provider Account</h2>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="row">
                            <div class="col-md-6">
                                <h5 class="mb-3">Account Information</h5>

                                <div class="mb-3">
                                    <label for="username" class="form-label">Username *</label>
                                    <input type="text" class="form-control" id="username" name="username" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label">Email *</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label">Password *</label>
                                    <input type="password" class="form-control" id="password" name="password" required>
                                </div>

                                <div class="mb-3">
                                    <label for="password2" class="form-label">Confirm Password *</label>
                                    <input type="password" class="form-control" id="password2" name="password2" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <h5 class="mb-3">Personal Information</h5>

                                <div class="mb-3">
                                    <label for="name" class="form-label">Full Name *</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>

                                <div class="mb-3">
                                    <label for="age" class="form-label">Age *</label>
                                    <input type="number" class="form-control" id="age" name="age" min="18" max="70" required>
                                </div>

                                <div class="mb-3">
                                    <label for="gender" class="form-label">Gender *</label>
                                    <select class="form-select" id="gender" name="gender" required>
                                        <option value="">Select Gender</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="contactNo" class="form-label">Contact Number *</label>
                                    <input type="tel" class="form-control" id="contactNo" name="contactNo" required>
                                </div>
                            </div>
                        </div>

                        <div class="row mt-3">
                            <div class="col-12">
                                <h5 class="mb-3">Service Information</h5>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="category" class="form-label">Service Category *</label>
                                    <select class="form-select" id="category" name="category" required>
                                        <option value="">Select Category</option>
                                        <option value="maid">House Maid</option>
                                        <option value="babysitter">Babysitter</option>
                                        <option value="caregiver">Caregiver</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="experience_year" class="form-label">Years of Experience *</label>
                                    <input type="number" class="form-control" id="experience_year" name="experience_year" step="0.5" min="0" required>
                                </div>

                                <div class="mb-3">
                                    <label for="hourlyRate" class="form-label">Hourly Rate (BDT) *</label>
                                    <input type="number" class="form-control" id="hourlyRate" name="hourlyRate" min="50" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="location" class="form-label">Location *</label>
                                    <input type="text" class="form-control" id="location" name="location" placeholder="e.g., Dhaka, Bangladesh" required>
                                </div>

                                <div class="mb-3">
                                    <label for="skills" class="form-label">Skills (comma-separated) *</label>
                                    <textarea class="form-control" id="skills" name="skills" rows="3" placeholder="e.g., Cleaning, Cooking, Child Care" required></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="profile_image" class="form-label">Profile Image</label>
                                    <input type="file" class="form-control" id="profile_image" name="profile_image" accept="image/*">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg mt-3">Create Provider Account</button>
                    </form>

                    <p class="text-center mt-4 text-muted">
                        Already have an account? <a href="{% url 'provider_login' %}" class="text-primary">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
